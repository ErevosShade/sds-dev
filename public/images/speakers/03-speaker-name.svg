<svg xmlns="http://www.w3.org/2000/svg" width="200" height="200" viewBox="0 0 200 200">
  <defs>
    <radialGradient id="bg" cx="50%" cy="35%" r="75%">
      <stop offset="0%" stop-color="#3B6FE8" stop-opacity="0.22"/>
      <stop offset="100%" stop-color="#1C2030" stop-opacity="1"/>
    </radialGradient>
    <clipPath id="circle"><circle cx="100" cy="100" r="100"/></clipPath>
  </defs>
  <g clip-path="url(#circle)">
    <rect width="200" height="200" fill="url(#bg)"/>
    <!-- shoulders -->
    <ellipse cx="100" cy="210" rx="84" ry="68" fill="#3B6FE8" fill-opacity="0.28"/>
    <!-- head -->
    <circle cx="100" cy="84" r="40" fill="#3B6FE8" fill-opacity="0.32"/>
  </g>
  <circle cx="100" cy="100" r="99" fill="none" stroke="#EEE9DC" stroke-opacity="0.08"/>
  <text x="50%" y="54%" font-family="DM Serif Display, serif" font-size="28" fill="#EEE9DC" fill-opacity="0.5" text-anchor="middle" dominant-baseline="middle">S</text>
</svg>